# This is a YAML file for GitHub Actions

name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macOS-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install

      - name: Build
        run: |
          npm run build

      - name: Add node_modules to git
        run: |
          git add node_modules/

      - name: Run tests
        run: |
          npm test
